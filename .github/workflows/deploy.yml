name: Simple CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install faas-cli
      run: |
        curl -sSL https://cli.openfaas.com | sudo sh

    - name: Skip Kubernetes setup
      run: |
        echo "Skipping k3s (not supported in GitHub runner)"

    - name: Fake Login
      run: |
        echo "password" | faas-cli login --username admin --password-stdin --gateway http://127.0.0.1:8080 || true

    - name: Fake Deploy
      run: |
        echo "Function deployed successfully (simulated)"

    - name: Terraform Init
      run: |
        echo "terraform init (simulated)"

    - name: Terraform Apply
      run: |
        echo "terraform apply (simulated)"

    - name: Terraform Destroy
      run: |
        echo "terraform destroy (simulated)"
